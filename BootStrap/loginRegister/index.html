<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../../bootstrap.min.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bg-primary d-flex justify-content-center m-5 text-dark-emphasis gap-5 align-items-end">
    <div class="bg-white border rounded-2 w-25 h-50 p-4 d-grid gap-4 me-5 mt-5">
      <h3 class="pb-4 text-black fw-bold"><u class="link-underline-primary">Lo</u>gin</h3>
      <div class="d-flex border-bottom  gap-2 align-items-center">
        <i class="bi bi-envelope"></i>
        <input
          type="text"
          placeholder="Enter your email"
          class="w-100 border-0 ps-2 form-control shadow-none"
        />
      </div>
      <div class="d-flex border-bottom gap-2 align-items-center">
        <i class="bi bi-lock"></i>
        <input
          type="password"
          placeholder="Enter your password"
          class="w-100 border-0 ps-2 form-control shadow-none"
        />
        <i class="bi bi-eye"></i>
      </div>
      <div class="d-flex justify-content-between ">
        <div class="d-flex align-items-center gap-1">
          <input type="checkbox" /><span>Remember Me</span>
        </div>
        <div class="text-primary">Forgot Password?</div>
      </div>
      <div>
        <button class="bg-primary border border-0 rounded-1 text-light w-100 py-2">Login Now</button>
      </div>
      <p class="text-center">Don't have an account?<span class="text-primary"> Signup Now</span></p>
    </div>

    <!-- Register -->
     <div class="bg-white border rounded-2 w-25 h-50 p-4 d-grid gap-4 mt-5">
      <h3 class="pb-4 text-black fw-bold"><u class="link-underline-primary">Re</u>gistration</h3>
      <div class="d-flex border-bottom gap-2 align-items-center">
        <i class="bi bi-person"></i>
        <input
          type="text"
          placeholder="Enter your name"
          class="w-100 border border-0 ps-2 form-control shadow-none"
        />
      </div>
       <div class="d-flex border-bottom gap-2 align-items-center">
        <i class="bi bi-envelope"></i>
        <input
          type="text"
          placeholder="Enter your email"
          class="w-100 border border-0 ps-2 form-control shadow-none"
        />
      </div>
      <div class="d-flex border-bottom gap-2 align-items-center">
        <i class="bi bi-lock"></i>
        <input
          type="password"
          placeholder="Create a Password"
          class="w-100 border border-0 ps-2 form-control shadow-none"
        />
      </div>
       <div class="d-flex border-bottom gap-2 align-items-center">
        <i class="bi bi-lock"></i>
        <input
          type="password"
          placeholder="Confirm a Password"
          class="w-100 border border-0 ps-2 form-control shadow-none"
        />
        <i class="bi bi-eye"></i>
      </div>
      <div class="d-flex justify-content-between ">
        <div class="d-flex align-items-center gap-1">
          <input type="checkbox"/><span>I accept all terms & condition</span>
        </div>
      </div>
      <div>
        <button class="bg-primary border border-0 rounded-1 text-light w-100 py-2">Register Now</button>
      </div>
      <p class="text-center">Already have an account?<span class="text-primary"> Login now</span></p>
    </div>
  </body>
</html>
