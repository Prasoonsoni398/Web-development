<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <caption>
        <h3>Registration Form : Dance Club</h3>
      </caption>
      <table border="1">
        <tr>
          <th>Name:</th>
          <td>
            <input type="text" name="name" id="name" />
          </td>
        </tr>
        <tr>
          <th>IC NO.</th>
          <td>
            <input type="text" />- <input type="text" />-
            <input type="text" />
          </td>
        </tr>
        <tr>
          <th>Address:</th>
          <td>
            <textarea name="address" id="address"></textarea>
          </td>
        </tr>
        <tr>
          <th>Gender:</th>
          <td>
            <input type="radio" name="gender" id="male" />
            <span>Male</span>
            <input type="radio" name="gender" id="female" />
            <span>Female</span>
          </td>
        </tr>
        <tr>
          <th>Dance Type:</th>
          <td>
            <input type="checkbox" name="zapin" id="zapin" /><span>Zapin</span>
            <input type="checkbox" name="joget" id="joget" /><span>Joget</span>
            <input type="checkbox" name="inang" /><span>Inang</span>
            <input type="checkbox" name="Lion Dance" /><span>Lion Dance</span>
          </td>
        </tr>
        <tr>
          <th>Competition:</th>
          <td>
            <input
              type="text"
              name="competition"
              id="competition"
              value="State Level National Level StateInternational Level"
            />
          </td>
        </tr>
        <tr>
          <th>Nationlaity:</th>
          <td>
            <select>
              <option value="">-please select</option>
              <option value="hindu">Hindu</option>
            </select>
          </td>
        </tr>
        <tr>
          <th>Password:</th>
          <td><input type="password" name="password" id="password" /></td>
        </tr>
      </table>
      <button type="submit">Register Me</button>
      <button type="reset">Cancel</button>
    </form>
  </body>
</html>
