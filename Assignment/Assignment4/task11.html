<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <table border="">
        <tr>
          <th colspan="4"><h2>Registration Form</h2></th>
        </tr>
        <tr>
          <td>Student Name</td>
          <td>
            <input type="text" placeholder="First Name" />
          </td>
          <td>
            <input type="text" placeholder="Middle Name" />
          </td>
          <td>
            <input type="text" placeholder="Last Name" />
          </td>
        </tr>
        <tr>
          <td>Father's Name</td>
          <td>
            <input type="text" placeholder="Enter your father's Name" />
          </td>
          <td>Mother's Name</td>
          <td>
            <input type="text" placeholder="Enter your mother's Name" />
          </td>
        </tr>
        <tr>
          <td>Date of Birth</td>
          <td>
            <input type="date" />
          </td>
          <td>Gender</td>
          <td>
            <span>Male</span>
            <input type="radio" name="gender" />
            <span>Female</span>
            <input type="radio" name="gender" />
          </td>
        </tr>
        <tr>
          <td>Category</td>
          <td>
            <span>Gen</span>
            <input type="radio" name="caste" />
            <span>OBC</span>
            <input type="radio" name="caste" />
            <span>SC/ST</span>
            <input type="radio" name="caste" />
          </td>

          <td>Handicaped</td>
          <td>
            <span>Yes</span>
            <input type="radio" name="Handicaped" />
            <span>No</span>
            <input type="radio" name="Handicaped" />
          </td>
        </tr>
        <tr>
          <td>Ex-Serviceman</td>
          <td>
            <span>Yes</span>
            <input type="radio" name="ex-serviceman" />
            <span>No</span>
            <input type="radio" name="ex-serviceman" />
          </td>
          <td>EWS</td>
          <td>
            <span>Yes</span>
            <input type="radio" name="ews" />
            <span>No</span>
            <input type="radio" name="ews" />
          </td>
        </tr>
        <tr>
          <td>Email ID</td>
          <td><input type="email" /></td>
          <td>Mobile No.</td>
          <td><input type="tel" /></td>
        </tr>
        <tr>
          <td>state</td>
          <td>
            <select>
              <option value="">Select any One</option>
              <option value="mp">M.P</option>
              <option value="up">U.P</option>
              <option value="cg">C.G</option>
            </select>
          </td>
          <td>City</td>
          <td>
            <select>
              <option value="">Select any One</option>
              <option value="satna">Satna</option>
              <option value="bhopal">Bhopal</option>
              <option value="indore">Indore</option>
            </select>
          </td>
        </tr>
        <tr>
          <td>Upload Photo</td>
          <td>
            <input type="file" />
          </td>
          <td>Upload Signature</td>
          <td>
            <input type="file" />
          </td>
        </tr>
        <tr>
          <td></td>
          <td colspan="3">
            <button type="submit">Submit</button>
          </td>
        </tr>
      </table>
    </form>
  </body>
</html>
