<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <table>
        <tr>
          <td>
            <img
              src="https://images.rawpixel.com/image_social_square/cHJpdmF0ZS9sci9pbWFnZXMvd2Vic2l0ZS8yMDIzLTA4L3Jhd3BpeGVsX29mZmljZV8zMF8zZF9pbGx1c3RyYXRpb25fb2ZfdGhlX2ZlbWFsZV9kb2N0b3Jfc3RhbmRpbl9jNWYyMWMwYS1kOTY5LTRiYzMtYmQxYi01ZmJlZjM1NmM2YzVfMS5qcGc.jpg"
              alt="doctor image"
              width="auto"
              height="500"
            />
          </td>
          <td>
            <h2 align="center">Doctor Appoitment Form</h2>
            <hr />
            <table>
              <tr>
                <td>Appointment Date</td>
                <td>
                  <input type="date" />
                </td>
              </tr>
              <tr>
                <td>Appointment Time</td>
                <td>
                  <input type="time" />
                </td>
              </tr>
              <tr>
                <td>Name</td>
                <td>
                  <input type="text" placeholder="First" />
                  <input type="text" placeholder="Last" />
                </td>
              </tr>
              <tr>
                <td>Gender</td>
                <td>
                  Male<input type="radio" name="gender" /> Female<input
                    type="radio"
                    name="gender"
                  />
                </td>
              </tr>
              <tr>
                <td>Phone</td>
                <td><input type="tel" placeholder="####" /></td>
              </tr>
              <tr>
                <td>Address</td>
                <td>
                  <input type="text" placeholder="city" />
                  <input type="text" placeholder="state" />
                </td>
              </tr>
              <tr>
                <td>Your Query</td>
                <td>
                  <textarea rows="3"></textarea>
                </td>
              </tr>
              <tr>
                <td>Appointment Type</td>
                <td>
                  <span>Select which appointment type(s) you require</span>
                   <br>
                  <input type="checkbox" /><span>Cervix checkup</span>
                  <br />
                  <input type="checkbox" /><span>Heart checkup</span>
                  <br />
                  <input type="checkbox" /><span>Eye check-up</span>
                  <br />
                  <input type="checkbox" /><span>Hearing Test</span>
                  <br />
                  <br />
                  <button type="submit">Send</button>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </form>
  </body>
</html>
