<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>Please enter your personal details:</p>
    <form>
      <label for="firstName">
        <b><u>F</u></b
        >irst name:* <input type="text" name="firstName" id="firstName"
      /></label>
      <br /><br />
      <label for="lastName">
        <b><u>L</u></b
        >ast name:* <input type="text" name="lastName" id="lastName"
      /></label>
      <br /><br />
      <label for="address"
        >Street <b><u>a</u></b
        >ddress: <input type="text" name="address" id="address"
      /></label>
      <br /><br />
      <label for="town/city">
        <b><u>T</u></b
        >own/city: <input type="text" name="town/city" id="town/city"
      /></label>
      <br /><br />
      <label for="zipcode"
        >Post <b><u>c</u></b
        >ode/zip: <input type="text" name="zipcode" id="zipcode"
      /></label>
      <br /><br />
      <label for="telephone"
        >Tele <b><u>p</u></b
        >hone: <input type="tel" name="telephone" id="telephone"
      /></label>
      <br /><br />
      <label for="mobile">
        <b><u>M</u></b
        >obile: <input type="text" name="mobile" id="mobile"
      /></label>
      <br /><br />
      <label for="email">
        <b><u>E</u></b
        >mail address:* <input type="email" name="email" id="email"
      /></label>
      <br /><br />
      <p>Feilds marked * are required.</p>
      <button>
        <b><u>S</u></b
        >ubmit
      </button>
    </form>
  </body>
</html>
