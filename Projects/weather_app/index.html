<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Mausam Ka Haal</title>

    <!-- Bootstrap -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="py-4">

    <div class="container">

      <!-- Heading -->

      <h1 class="text-center text-white fw-bold display-4 mb-4">
        🌦️ Mausam Ka Haal ⛅
      </h1>

      <!-- Search Box -->

      <div class="search-box d-flex gap-3 mb-4">

        <input
          type="text"
          id="cityName"
          class="form-control bg-transparent text-white rounded-3 shadow-none fs-5"
          placeholder="Enter city name"
        />

        <button
          onclick="getWeather()"
          class="btn btn-light fs-4"
        >
          <i class="bi bi-search"></i>
        </button>

      </div>

      <!-- Main Card -->

      <div
        class="main-card d-flex justify-content-between align-items-center flex-wrap mb-4"
      >

        <div class="top d-flex align-items-center ">

          <div>

            <h2
              id="city"
              class="text-danger fw-semibold display-5"
            >
              City Name
            </h2>

            <p
              id="condition"
              class="text-warning fs-5 gap-2"
            >
              Weather Condition
            </p>

          </div>
          <i class="bi bi-cloud-fill text-white display-2 ps-5 cloud"></i>


        </div>

        <h2 class="temp text-white ">
          <span id="temperature">0</span>°C
        </h2>

      </div>

      <!-- Weather Cards -->

      <div class="row g-4">

        <div class="col-md-6 col-lg-3">

          <div class="weather-card text-center h-100">

            <i class="bi bi-droplet-fill fs-1 text-white"></i>

            <h3
              id="humidity"
              class="text-white fw-bold mt-3"
            >
              0%
            </h3>

            <p class="text-light">
              Humidity
            </p>

          </div>

        </div>

        <div class="col-md-6 col-lg-3">

          <div class="weather-card text-center h-100">

            <i class="bi bi-wind fs-1 text-white"></i>

            <h3
              id="wind"
              class="text-white fw-bold mt-3"
            >
              0 km/h
            </h3>

            <p class="text-light">
              Wind Speed
            </p>

          </div>

        </div>

        <div class="col-md-6 col-lg-3">

          <div class="weather-card text-center h-100">

            <i class="bi bi-thermometer-half fs-1 text-white"></i>

            <h3
              id="feelsLike"
              class="text-white fw-bold mt-3"
            >
              0°C
            </h3>

            <p class="text-light">
              Feels Like
            </p>

          </div>

        </div>

        <div class="col-md-6 col-lg-3">

          <div class="weather-card text-center h-100">

            <i class="bi bi-speedometer2 fs-1 text-white"></i>

            <h3
              id="pressure"
              class="text-white fw-bold mt-3"
            >
              0 hPa
            </h3>

            <p class="text-light">
              Pressure
            </p>

          </div>

        </div>

      </div>

    </div>

    <script src="script.js"></script>

  </body>
</html>
