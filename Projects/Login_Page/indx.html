<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Login Page</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(to right, #175cdd, #4facfe);
        height: 100vh;
      }

      .login-box {
        width: 100%;
        max-width: 400px;
        border-radius: 20px;
      }
    </style>
  </head>

  <body>
    <div
      class="container vh-100 d-flex justify-content-center align-items-center"
    >
      <div class="card login-box shadow p-4">
        <h2 class="text-center mb-4">Login</h2>

        <form>
          <!-- Email -->
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              placeholder="Enter your email"
            />
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              placeholder="Enter your password"
            />
          </div>

          <!-- Remember -->
          <div class="d-flex justify-content-between mb-3">
            <div>
              <input type="checkbox" class="form-check-input" id="check" />
              <label for="check" class="form-check-label"> Remember me </label>
            </div>

            <a href="#" class="text-decoration-none"> Forgot Password? </a>
          </div>

          <!-- Button -->
          <button class="btn btn-primary w-100">Login</button>
        </form>

        <p class="text-center mt-3 mb-0">
          Don't have an account?
          <a href="#" class="text-decoration-none"> Register </a>
        </p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
