<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="page-body">
    <header class="todo-header text-center">
      <div class="container">
        <h1>My To Do List</h1>
        <p class="lead">Track tasks, stay organized, and complete your day with confidence.</p>
      </div>
    </header>

    <main class="todo-main">
      <div class="container todo-card p-4">
        <div class="d-flex flex-column flex-md-row gap-3">
          <input
            type="text"
            name="newTask"
            id="newTask"
            placeholder="Add a new task"
            class="form-control"
          />
          <button
            class="btn btn-primary add-btn d-flex gap-2 align-items-center justify-content-center"
            onclick="addNewTask()"
          >
            <i class="bi bi-plus-circle"></i> Add Task
          </button>
        </div>

        <div class="task-panel mt-4 d-none" id="taskDiv">
          <div class="d-flex align-items-center justify-content-between mb-3">
            <h2 class="h5 mb-0">Your Tasks</h2>
          </div>
          <ol id="taskList" class="task-list"></ol>
        </div>
      </div>
    </main>
    <!-- Scripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
