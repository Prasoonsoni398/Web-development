<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Currency Converter</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="card p-4 shadow converter-card">
        <h1 class="text-center mb-4">Currency Converter</h1>

        <!-- Amount -->
        <div class="mb-3">
          <input    
            type="number"
            id="orgAmount"
            class="form-control"
            placeholder="Enter amount"
          />

          <small id="error" class="text-danger"></small>
        </div>

        <!-- Countries -->
        <div class="row align-items-center g-3">
          <!-- From -->
          <div class="col-md-5 text-center">
            <img id="flag1" src="" class="flag-img mb-2" />

            <select id="country1" class="form-select">
              <option value="">Select Country</option>
            </select>
          </div>

          <!-- Swap -->
          <div class="col-md-2 text-center">
            <button id="swapBtn" class="btn btn-primary rounded-circle">
              <i class="bi bi-arrow-left-right"></i>
            </button>
          </div>

          <!-- To -->
          <div class="col-md-5 text-center">
            <img id="flag2" src="" class="flag-img mb-2" />

            <select id="country2" class="form-select">
              <option value="">Select Country</option>
            </select>
          </div>
        </div>

        <!-- Convert Button -->
        <div class="d-grid mt-4">
          <button id="convertBtn" class="btn btn-success">Convert</button>
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center mt-3 d-none">
          <div class="spinner-border text-primary"></div>

          <p class="mt-2">Converting...</p>
        </div>

        <!-- Result -->
        <div id="newAmount" class="result-box mt-4 text-center"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
