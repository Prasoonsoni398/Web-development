<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Jokes ka Pitara</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="d-flex flex-column">
    <!-- Header -->
    <header class="bg-dark shadow">
      <div class="container py-3 text-center text-white">
        <h1 class="fw-bold">
          <i class="bi bi-emoji-laughing-fill text-warning"></i>
          Jokes Ka Pitara
        </h1>
      </div>
    </header>

    <!-- Main -->
    <main
      class="container flex-grow-1 d-flex justify-content-center align-items-center"
    >
      <div
        class="card joke-card shadow-lg border-0 rounded-4 p-4 text-center w-100"
        style="max-width: 650px"
      >
        <div class="mb-3">
          <i class="bi bi-chat-square-quote-fill text-primary display-3"></i>
        </div>

        <h2 class="fw-bold mb-4">Daily Dose of Laughter 😂</h2>

        <p id="setup" class="fs-4 fw-semibold text-dark">
          Your joke will appear here...
        </p>

        <p id="delivery" class="fs-5 text-secondary"></p>

        <div class="mt-4">
          <button
            class="btn btn-primary btn-lg rounded-pill px-4"
            onclick="GetNewJokes()"
          >
            <i class="bi bi-arrow-repeat"></i>
            Get New Joke
          </button>
        </div>
      </div>
    </main>

    <script src="sccrip.js"></script>
  </body>
</html>
