<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <link rel="shortcut icon" href="/PrasoonLogo.png" type="image/x-icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body style="background: linear-gradient(to bottom, rgb(243, 122, 209) , rgb(241, 108, 108));">
    <h1
      class="text-center text-primary py-5 rounded-top-4 "
     style="background: linear-gradient(to right, rgb(122, 203, 243) , rgb(232, 226, 233));"
    >
      Coaching Institute Registration Form
    </h1>
   <div class="d-flex justify-content-center align-items-center py-5" >
     <form
      class="bg-primary-subtle shadow-lg rounded-1 px-md-5 px-4 py-4 w-75"
    >
      <h2 class="text-center text-primary">Registration Form</h2>

      <section>
        <div class="row bg-light shadow-lg rounded-2 p-3 mt-4">
          <h5 class="text-primary-emphasis">Personal Information</h5>
          <div class="col-lg-6 col-12 p-2">
            <div class="d-grid gap-lg-2">
              <label for="fullName">Full Name</label>
              <input
                type="text"
                id="fullName"
                placeholder="Enter your name"
                class="form-control py-2"
                required
              />
              <span id="error-fullName" class="text-danger"></span>
            </div>
          </div>
          <div class="col-lg-6 col-12 p-2">
            <div class="d-grid gap-lg-2">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                placeholder="Enter your Email"
                class="form-control py-2"
                required
              />
              <span id="error-email" class="text-danger"></span>
            </div>
          </div>
          <div class="col-lg-6 col-12 p-2">
            <div class="d-grid gap-lg-2">
              <label for="Phone">Phone</label>
              <input
                type="tel"
                id="Phone"
                placeholder="Enter your Phone number"
                class="form-control py-2"
                required
              />
              <span id="error-Phone" class="text-danger"></span>
            </div>
          </div>
          <div class="col-lg-6 col-12 p-2">
            <div class="d-grid gap-lg-2">
              <label for="Dob">Date of Birth</label>
              <input
                type="date"
                id="date"
                placeholder="DOB"
                class="form-control py-2"
                required
              />
              <span id="error-date" class="text-danger"></span>
            </div>
          </div>
          <div class="col-lg-6 col-12 p-2">
              <p>Gender:</p>
            <div class="d-flex gap-3 flex-wrap">
              
              <div>
                <input type="radio" id="male" name="gender" required /><span class="ms-2">Male</span>
              </div>
              <div>
                <input type="radio" id="female" name="gender" required /><span class="ms-2">Female</span>
              </div>
              <div>
                <input type="radio" id="others" name="gender" required /><span class="ms-2">Others</span>
              </div>
            </div>
            <span id="error-gender" class="text-danger"></span>
          </div>
        </div>
      </section>

      <section>
        <div class="row bg-light shadow-lg rounded-2 p-3 mt-4">
          <h5 class="text-primary-emphasis">Academic Details</h5>

          <div class="col-lg-6 col-12 p-2">
            <div class="d-grid gap-lg-2">
              <span>Academic Qualification</span>
              <select
                name="Qualification"
                id="Qualification"
                class="form-select py-2"
              >
                <option value="" disabled>Select Academic Qualification</option>
                <option value="10th">10th Pass</option>
                <option value="12th">12th Pass</option>
                <option value="graduate">Graduate</option>
                <option value="post-graduate">Post Graduate</option>
                <option value="others">Others</option>
              </select>
              <span id="error-Qualification" class="text-danger"></span>
            </div>
          </div>
          <div class="col-lg-6 col-12 p-2">
            <div class="d-grid gap-lg-2">
              <span>Grade in Last Qualification</span>
              <select
                name="Grade"
                id="Grade"
                class="form-select py-2"
              >
                <option value="" disabled>Select Academic Qualification</option>
                <option value="10th">10th Pass</option>
                <option value="12th">12th Pass</option>
                <option value="graduate">Graduate</option>
                <option value="post-graduate">Post Graduate</option>
                <option value="others">Others</option>
              </select>
              <span id="error-percentage" class="text-danger"></span>
            </div>
          </div>
        </div>
      </section>

      <section>
        <div class="row bg-light shadow-lg rounded-2 p-3 mt-4">
          <h5 class="text-primary-emphasis">Course Information</h5>
          <div class="col-lg-6 col-12 p-2">
            <div class="d-grid gap-lg-2">
              <span>Preferred Course</span>
              <select name="preferred" id="preferred" class="form-select py-2">
                <option value="" disabled>Select Preferred course</option>
                <option value="iit-jee">IIT-Jee</option>
                <option value="neet">Neet</option>
                <option value="banking">Banking Exams</option>
                <option value="upsc">UPSC</option>
                <option value="others">Others</option>
              </select>
              <span id="error-preferred" class="text-danger"></span>
            </div>
          </div>
          <div class="col-lg-6 col-12 p-2">
            <div class="d-grid gap-lg-2">
              <span>Batch Timing</span>
              <select
                name="batch-timing"
                id="batch-timing"
                class="form-select py-2"
              >
                <option value="" disabled>Select Batch timing</option>
                <option value="morning">Morning</option>
                <option value="afternoon">Afternoon</option>
                <option value="evening">Evening</option>
                <option value="weekend">Weekend</option>
              </select>
              <span id="error-batch-timing" class="text-danger"></span>
            </div>
          </div>
        </div>
      </section>

      <section>
        <div class="row bg-light shadow-lg rounded-2 p-3 mt-4">
          <h5 class="text-primary-emphasis">Address</h5>
          <div class="col-lg-6 col-12 p-2">
            <div class="d-grid gap-lg-2">
              <label for="residential">Residential</label>
              <textarea
                type="text"
                id="residential"
                class="form-control py-2"
                placeholder="Enter your Residential area"
                rows="5"
              ></textarea>
              <span id="error-residential" class="text-danger"></span>
            </div>
          </div>
          <div class="col-lg-6 col-12 p-2">
            <div class="d-grid gap-lg-2">
              <label for="city">City</label>
              <input
                type="text"
                id="city"
                class="form-control py-2"
                placeholder="Enter your City"
              />
              <span id="error-city" class="text-danger"></span>
            </div>
            <div class="d-grid gap-lg-2 mt-3">
              <label for="pincode">Pincode</label>
              <input
                type="text"
                id="pincode"
                class="form-control py-2"
                placeholder="Enter your pincode"
              />
              <span id="error-pincode" class="text-danger"></span>
            </div>
          </div>
        </div>
      </section>

      <section>
        <div class="row bg-light shadow-lg rounded-2 p-3 mt-4">
          <h5 class="text-primary-emphasis">Guardian Details</h5>
          <div class="col-lg-6 col-12 p-2">
            <div class="d-grid gap-lg-2">
              <label for="GfullName">Guardian's Full name</label>
              <input
                type="text"
                id="GfullName"
                class="form-control py-2"
                placeholder="Enter Guardian's Full Name"
              />
              <span id="error-GfullName" class="text-danger"></span>
            </div>
          </div>
          <div class="col-lg-6 col-12 p-2">
            <div class="d-grid gap-lg-2">
              <label for="Gphone">Guardian's Phone</label>
              <input
                type="tel"
                id="Gphone"
                class="form-control py-2"
                placeholder="Enter Guardian's Contact"
              />
              <span id="error-Gphone" class="text-danger"></span>
            </div>
          </div>
        </div>
      </section>
      <section>
        <div class="row bg-light shadow-lg rounded-2 p-3 mt-4">
          <div class="col-lg-6 col-12 p-2">
            <button
              type="submit"
              class="btn btn-primary rounded-3 w-100 "
            >
              SUBMIT
            </button>
          </div>
          <div class="col-lg-6 col-12 p-2">
            <button
              type="reset"
              class="btn btn-outline-danger rounded-top-4 rounded-0 rounded-start-0 w-100"
            >
              Reset
            </button>
          </div>
        </div>
      </section>
    </form>
   </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
