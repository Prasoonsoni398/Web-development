<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class=" bg-success-subtle">
    <div
      class=" bg-light rounded-4 bg-warning-subtle shadow-lg translate-middle border position-absolute top-50 start-50 p-sm-4 p-1"
    >
      <h1 class="text-center mb-3">Age Calculator</h1>
      <form class="d-flex align-items-center flex-column gap-3">
        <label for="DOB" class="">Enter your Date of Birth</label>
        <input type="date" name="DOB" id="DOB" class="form-control" />
        <label for="CurrentDate" class="">Choose Current Date</label>
        <input
          type="date"
          name="CurrentDate"
          id="CurrentDate"
          class="form-control"
        />
        <button class="btn btn-primary rounded-pill">Calculate Age</button>
        <div class="fw-bold">
          Your age is: <span id="years">XX</span> Years
          <span id="months">XX</span> Months <span id="day">XX</span>
        </div>
      </form>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
