<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Calculator</title>

    <link rel="stylesheet" href="/bootstrap.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div>
      <img
        src="./bg-image.png"
        alt="bg-image"
        class="vh-100 vw-100 object-fit-cover position-fixed top-0 start-0"
      />
    </div>

    <div
      class="position-absolute top-50 start-50 translate-middle w-100 d-flex justify-content-center px-3"
    >
      <div
        class="position-relative shadow-lg rounded-5 overflow-hidden bg-light"
        id="bg-calci"
      >
        <div
          class="position-absolute top-0 start-0 w-100 h-100 p-2 d-grid gap-2"
        >
          <div
            class="rounded-top-5 p-3 border border-2 border-dark-subtle bg-success-subtle fs-4 overflow-auto w-100 d-flex align-items-center"
          >
            <label for="" class="text-end w-100 h-50" id="text">0</label>
          </div>

          <div
            class="border border-2 border-dark-subtle bg-danger-subtle rounded-bottom-5 ps-4 pt-3 d-grid"
            id="calci"
          >
            <button
              class="btn btn-light rounded-circle shadow-lg"
              onclick="Calculate('AC')"
            >
              AC
            </button>
            <button
              class="btn btn-light rounded-circle shadow-lg"
              onclick="Calculate('C')"
            >
              C
            </button>
            <button
              class="btn btn-light rounded-circle shadow-lg"
              onclick="Calculate('%')"
            >
              %
            </button>
            <button
              class="btn btn-warning rounded-circle shadow-lg"
              onclick="Calculate('/')"
            >
              /
            </button>

            <button
              class="btn btn-light rounded-circle shadow-lg"
              onclick="Calculate('7')"
            >
              7
            </button>
            <button
              class="btn btn-light rounded-circle shadow-lg"
              onclick="Calculate('8')"
            >
              8
            </button>
            <button
              class="btn btn-light rounded-circle shadow-lg"
              onclick="Calculate('9')"
            >
              9
            </button>
            <button
              class="btn btn-warning rounded-circle shadow-lg"
              onclick="Calculate('*')"
            >
              *
            </button>

            <button
              class="btn btn-light rounded-circle shadow-lg"
              onclick="Calculate('4')"
            >
              4
            </button>
            <button
              class="btn btn-light rounded-circle shadow-lg"
              onclick="Calculate('5')"
            >
              5
            </button>
            <button
              class="btn btn-light rounded-circle shadow-lg"
              onclick="Calculate('6')"
            >
              6
            </button>
            <button
              class="btn btn-warning rounded-circle shadow-lg"
              onclick="Calculate('-')"
            >
              -
            </button>

            <button
              class="btn btn-light rounded-circle shadow-lg"
              onclick="Calculate('1')"
            >
              1
            </button>
            <button
              class="btn btn-light rounded-circle shadow-lg"
              onclick="Calculate('2')"
            >
              2
            </button>
            <button
              class="btn btn-light rounded-circle shadow-lg"
              onclick="Calculate('3')"
            >
              3
            </button>
            <button
              class="btn btn-warning rounded-circle shadow-lg"
              onclick="Calculate('+')"
            >
              +
            </button>

            <button
              class="btn btn-light rounded-circle shadow-lg"
              onclick="Calculate('0')"
            >
              0
            </button>
            <button
              class="btn btn-light rounded-circle shadow-lg"
              onclick="Calculate('.')"
            >
              .
            </button>
            <button
              class="btn btn-success rounded-pill fs-3 equal-btn mt-1 shadow-lg"
              onclick="Calculate('=')"
            >
              =
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
