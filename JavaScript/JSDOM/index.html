<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/bootstrap.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container d-flex mt-5 gap-5">
      <input
        type="text"
        id="fullName"
        placeholder="Enter your name"
        class="form-control"
      />
      <button class="btn btn-primary" onclick="Submit()">Submit</button>
    </div>
    <hr />
    <div class="container border shadow p-4 divHide rounded-4" id="dataCard">
      <span>Name:</span>
      <span id="myData"></span>
    </div>
    <div class="container w-full text-center divHide mt-5" id="hideButton">
      <button class="btn btn-primary" onclick="Hide(),showAlert()">Hide Data</button>
    </div>

    <div id="customAlert" class="alert-box bg-success text-white p-3 shadow-lg rounded-3">
      Data is Hidden Successfully ✅
      <button onclick="closeAlert()" class="bg-white text-primary btn">OK</button>
    </div>


    <!-- Script -->
    <script src="script.js"></script>
    <!-- BootStrap Link -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
