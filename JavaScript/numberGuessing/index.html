<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guess Game</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container-center">
    <div class="card game-card p-4 text-center">

      <h2 class="mb-3">🎯 Guess the Number</h2>
      <p class="text-muted">Pick a number between 1 and 10</p>

      <input type="number" id="guessInput" class="form-control my-3" placeholder="Enter your guess">

      <button onclick="checkGuess()" class="btn btn-success w-100">Submit Guess</button>

      <p id="message" class="mt-3 fw-bold"></p>
      <p id="chances" class="text-secondary">Chances left: 5</p>

      <button onclick="resetGame()" class="btn btn-outline-success mt-2">Restart Game</button>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
