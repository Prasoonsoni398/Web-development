<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="forget-div">
      <div class="logo">
        <h3>Forgot Password?</h3>
          <p>No worries! Enter your email and we <span>will send you a reset link</span> </p>
        <img src="./forgot-password.png" alt="Forgot Password" />
        <div class="welcome">
        </div>
      </div>
      <div class="input-div">
        <div class="input-field">
          <span>Email</span>
          <label for="reset-password"></label>
          <input
            type="email"
            name="reset-password"
            id="reset-password"
            placeholder="Enter your email"
          />
        </div>
        <div class="button">
            <button>
                <a href="">Send Reset Link</a>
            </button>
        </div>
        <div class="account">
            <a href="./index-login.html">Back to login</a>
        </div>
      </div>
    </div>
  </body>
</html>
