<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="registerdiv">
      <div class="logo">
        <img src="./create account.webp" alt="Create account" />
        <div class="welcome">
          <h3>Create account</h3>
          <p>Join us and start today</p>
        </div>
      </div>
      <div class="input-div">
        <div class="input-field">
          <span>Full Name</span>
          <label for="name"></label>
          <input
            type="text"
            name="name"
            id="name"
            placeholder="Enter your name"
          />
        </div>
      </div>
      <div class="input-div">
        <div class="input-field">
          <span>Email</span>
          <label for="register-email"></label>
          <input
            type="email"
            name="register-email"
            id="register-email"
            placeholder="Enter your email"
          />
        </div>
      </div>
      <div class="input-div">
        <div class="input-field">
          <span>Password</span>
          <label for="register-password"></label>
          <input
            type="password"
            name="register-password"
            id="register-password"
            placeholder="Create your password"
          />
        </div>
      </div>
      <div class="input-div">
        <div class="input-field">
          <span>Password</span>
          <label for="confirm-password"></label>
          <input
            type="password"
            name="confirm-password"
            id="confirm-password"
            placeholder="Confirm your password"
          />
        </div>
      </div>
      <div class="terms">
        <label for="terms"></label>
        <input type="checkbox" name="terms" id="terms">
        <p>I agree to the <span> Terms of service </span>and <span>Privacy Policy</span></p>
      </div>
       <div class="button">
        <button>
          <a href="" class="a">Register</a>
        </button>
      </div>
      <div class="account">
        <p>Already have account? </p>
        <a href="index-login.html">Login</a>
      </div>
    </div>
  </body>
</html>
