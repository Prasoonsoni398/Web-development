<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <header>
      <div
        class="header d-flex justify-content-between align-items-center mx-5"
      >
        <div class="headerLogo">
          <a href="./index.html">
            <img src="./images/transparentLogoLight-De2Z7I01.png" alt="Logo" />
          </a>
        </div>
        <div class="loginRegister">
          <a href="./login.html" class="login btn text-white" id="login"
            >Login</a
          >
          <a href="./register.html" class="register btn" id="register"
            >Register</a
          >
        </div>
      </div>
    </header>
    <main class="">
      <div class="position-absolute login w-100">
        <div class="login-bg">
          <img src="./images/foodTable.webp" alt="FoodTable" class="" />
        </div>
        <div class="login-div card p-4 w-25 d-grid position-absolute">
          <h2 class="text-center fw-bold">Welcome Back</h2>
          <p class="text-center">Login to your Cravings account</p>
          <div class="login-input d-grid gap-1 mb-4">
            <span>Email</span>
            <input type="email" class="input-field form-control shadow-none" />
          </div>
          <div class="login-input d-grid gap-1 mb-4">
            <span>Password</span>
            <div class="d-flex align-items-center px-3 input-field pb">
              <input type="password" class="form-control shadow-none bg-transparent border-0" />
              <i class="bi bi-eye-fill"></i>
            </div>
          </div>
          <div class="remember d-flex justify-content-between">
            <div>
              <input type="checkbox" id="remember" />
              <label for="remember">Remember me</label>
            </div>
            <div>
              <a href="">Forgot Password?</a>
            </div>
          </div>
          <button class="btn w-100 my-3 py-2" type="submit">
            <a href="">Login</a>
          </button>
          <div class="d-flex align-items-center">
            <hr class="w-25">
            Don't have account?
            <hr class="w-25">
          </div>
          <a href="./register.html" class="text-center">Create an account</a>
        </div>
      </div>
    </main>
  </body>
</html>
